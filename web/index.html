<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automata Editor</title>
    <style>
        body { font-family: monospace; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.2rem; margin-bottom: 2rem; }
        label { display: block; margin-bottom: 0.4rem; color: #666; }
        input { font-family: monospace; font-size: 1rem; padding: 6px 10px; width: 100%; box-sizing: border-box; }
        button { margin-top: 0.8rem; padding: 6px 16px; font-family: monospace; cursor: pointer; }
        #result { margin-top: 1.2rem; font-size: 1.1rem; }
        .accepted { color: green; }
        .rejected { color: red; }
    </style>
</head>
<body>
    <h1>automata-editor — WASM bridge test</h1>

    <label for="json-input">Automaton JSON</label>
    <textarea id="json-input" rows="10" style="width:100%;font-family:monospace;font-size:0.85rem;box-sizing:border-box;">{
  "type": "fa",
  "states": ["q0", "q1", "q2"],
  "alphabet": ["a", "b"],
  "transitions": [
    { "from": "q0", "symbol": "a", "to": ["q0", "q1"] },
    { "from": "q0", "symbol": "b", "to": ["q0"] },
    { "from": "q1", "symbol": "b", "to": ["q2"] }
  ],
  "initial": "q0",
  "accepting": ["q2"]
}</textarea>
    <button id="load">Load automaton</button>
    <div id="load-result" style="margin:0.4rem 0;color:#888;"></div>

    <label for="input" style="margin-top:1rem;display:block;">Input string</label>
    <input id="input" type="text" placeholder="e.g. aab" />
    <button id="check">Check</button>

    <div id="result"></div>

    <script src="odin.js"></script>
    <script>
        let wmi = null;

        function writeToWasm(getBufFn, data) {
            const ptr = wmi.exports[getBufFn]();
            new Uint8Array(wmi.memory.buffer, ptr, data.length).set(data);
        }

        async function init() {
            wmi = new odin.WasmMemoryInterface();
            await odin.runWasm("automata.wasm", null, {}, wmi);
        }

        document.getElementById("load").addEventListener("click", () => {
            if (!wmi) return;
            const json = new TextEncoder().encode(document.getElementById("json-input").value);
            writeToWasm("get_json_buf", json);
            const ok = wmi.exports.load_automaton(json.length);
            document.getElementById("load-result").textContent = ok ? "Loaded." : "Parse error.";
        });

        document.getElementById("check").addEventListener("click", () => {
            if (!wmi) return;
            const input = new TextEncoder().encode(document.getElementById("input").value);
            writeToWasm("get_input_buf", input);
            const accepted = wmi.exports.accepts_current(input.length);
            const result = document.getElementById("result");
            result.textContent = accepted ? "Accepted" : "Rejected";
            result.className = accepted ? "accepted" : "rejected";
        });

        init();
    </script>
</body>
</html>
